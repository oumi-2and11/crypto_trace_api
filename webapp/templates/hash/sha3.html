{% extends "layouts/layout_hash.html" %}

{% block category_content %}
<h1>SHA-3</h1>
<p class="algo-desc">SHA3-256 (Keccak) 哈希算法，输出 256 位摘要。</p>

<div class="grid-cards">
  <article class="card">
    <h3>&#128230; 输入区 <span class="card-badge">Input</span></h3>
    <div class="form-group">
      <label>输入数据</label>
      <textarea id="sha3-input" rows="3" placeholder="输入数据"></textarea>
    </div>
    <div class="form-group">
      <label>输入编码</label>
      <select id="sha3-encoding"><option value="hex">Hex</option><option value="text">Text</option></select>
    </div>
    <div class="form-group form-row">
      <label><input type="checkbox" id="sha3-trace"> 开启 Trace</label>
    </div>
    <button class="btn" onclick="runHash('SHA3')">执行</button>
  </article>
  <article class="card">
    <h3>&#9881; 参数区 <span class="card-badge">Params</span></h3>
    <p>Keccak-f[1600] 置换，24 轮，吸收-挤压 (sponge) 模式。</p>
  </article>
  <article class="card">
    <h3>&#128230; 输出区 <span class="card-badge">Output</span></h3>
    <div id="sha3-result" class="result-box">等待执行...</div>
    <div id="sha3-time" class="result-time"></div>
  </article>
  <article class="card">
    <h3>&#128200; Trace 区 <span class="card-badge">Trace</span></h3>
    <div id="sha3-trace" class="trace-box">开启 Trace 后显示执行过程</div>
  </article>
</div>

<script>
// runHash defined in sha1.html; if not loaded, define it
if (typeof runHash === 'undefined') {
  function runHash(algo) {
    var prefix = algo.toLowerCase().replace('-','');
    apiCall('/api/hash/digest', {
      algorithm: algo, data: document.getElementById(prefix + '-input').value,
      encoding: document.getElementById(prefix + '-encoding').value, output: 'hex',
      trace: document.getElementById(prefix + '-trace').checked, trace_level: 1
    }, function(r) {
      document.getElementById(prefix + '-result').textContent = r.result ? r.result.digest : r.status_message;
      document.getElementById(prefix + '-time').textContent = r.time_ms ? '耗时: ' + r.time_ms.toFixed(3) + ' ms' : '';
      renderTrace(prefix + '-trace', r.trace);
    });
  }
}
</script>
{% endblock %}
