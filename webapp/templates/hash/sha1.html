{% extends "layouts/layout_hash.html" %}

{% block category_content %}
<h1>SHA-1</h1>
<p class="algo-desc">SHA-1 哈希算法，输出 160 位 (20 字节) 摘要。</p>

<div class="grid-cards">
  <article class="card">
    <h3>&#128230; 输入区 <span class="card-badge">Input</span></h3>
    <div class="form-group">
      <label>输入数据</label>
      <textarea id="sha1-input" rows="3" placeholder="输入数据"></textarea>
    </div>
    <div class="form-group">
      <label>输入编码</label>
      <select id="sha1-encoding"><option value="hex">Hex</option><option value="text">Text</option></select>
    </div>
    <div class="form-group form-row">
      <label><input type="checkbox" id="sha1-trace"> 开启 Trace</label>
    </div>
    <button class="btn" onclick="runHash('SHA1')">执行</button>
  </article>
  <article class="card">
    <h3>&#9881; 参数区 <span class="card-badge">Params</span></h3>
    <p>SHA-1: 80 轮，5 个 32-bit 寄存器，输出 160 位。</p>
  </article>
  <article class="card">
    <h3>&#128230; 输出区 <span class="card-badge">Output</span></h3>
    <div id="sha1-result" class="result-box">等待执行...</div>
    <div id="sha1-time" class="result-time"></div>
  </article>
  <article class="card">
    <h3>&#128200; Trace 区 <span class="card-badge">Trace</span></h3>
    <div id="sha1-trace-box" class="trace-box">开启 Trace 后显示执行过程</div>
  </article>
</div>

<script>
function runHash(algo) {
  var prefix = algo.toLowerCase().replace('-','');
  var input = document.getElementById(prefix + '-input') || document.getElementById('sha1-input');
  var encoding = document.getElementById(prefix + '-encoding') || document.getElementById('sha1-encoding');
  var trace = document.getElementById(prefix + '-trace') || document.getElementById('sha1-trace');
  apiCall('/api/hash/digest', {
    algorithm: algo, data: input.value,
    encoding: encoding.value, output: 'hex',
    trace: trace.checked, trace_level: 1
  }, function(r) {
    document.getElementById(prefix + '-result').textContent = r.result ? r.result.digest : r.status_message;
    document.getElementById(prefix + '-time').textContent = r.time_ms ? '耗时: ' + r.time_ms.toFixed(3) + ' ms' : '';
    renderTrace(prefix + '-trace-box', r.trace);
  });
}
</script>
{% endblock %}
