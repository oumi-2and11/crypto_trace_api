{% extends "layout.html" %}

{% block content %}
<section class="page-section">
  <h1>自检验证</h1>
  <p>统一自检入口，使用标准测试向量对已实现的算法进行正确性校验。</p>
  <button class="btn" onclick="runSelftest()" style="margin-bottom:20px;">运行自检</button>
  <div id="selftest-summary" class="result-box" style="margin-bottom:16px;">点击"运行自检"开始</div>
  <div id="selftest-grid" class="selftest-grid">
    <div class="selftest-item" data-algo="AES">
      <div class="algo-name">AES</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="SM4">
      <div class="algo-name">SM4</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="RC6">
      <div class="algo-name">RC6</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="SHA-256">
      <div class="algo-name">SHA-256</div>
      <div class="algo-status">待验证</div>
    </div>
    <div class="selftest-item" data-algo="SHA-1">
      <div class="algo-name">SHA-1</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="SHA-3">
      <div class="algo-name">SHA-3</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="RIPEMD-160">
      <div class="algo-name">RIPEMD-160</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="HMAC">
      <div class="algo-name">HMAC</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="PBKDF2">
      <div class="algo-name">PBKDF2</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="RSA">
      <div class="algo-name">RSA</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="ECC">
      <div class="algo-name">ECC</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="ECDSA">
      <div class="algo-name">ECDSA</div>
      <div class="algo-status">待实现</div>
    </div>
    <div class="selftest-item" data-algo="Base64">
      <div class="algo-name">Base64</div>
      <div class="algo-status">待验证</div>
    </div>
    <div class="selftest-item" data-algo="UTF-8">
      <div class="algo-name">UTF-8</div>
      <div class="algo-status">待验证</div>
    </div>
  </div>
  <div id="selftest-detail" style="margin-top:20px;"></div>
</section>
{% endblock %}
