<h1>{{ algorithm_title }}</h1>
<p class="algo-desc">{{ algorithm_desc }}</p>
<div class="grid-cards">
  <article class="card">
    <h3>&#128230; 输入区 <span class="card-badge">Input</span></h3>
    <p>预留输入明文/密文或消息文本。</p>
  </article>
  <article class="card">
    <h3>&#9881; 参数区 <span class="card-badge">Params</span></h3>
    <p>预留 key、iv、mode、迭代次数等参数。</p>
  </article>
  <article class="card">
    <h3>&#128230; 输出区 <span class="card-badge">Output</span></h3>
    <p>预留结果展示（hex/base64/text）。</p>
  </article>
  <article class="card">
    <h3>&#128200; Trace 区 <span class="card-badge">Trace</span></h3>
    <p>预留执行过程轨迹展示。</p>
  </article>
</div>
