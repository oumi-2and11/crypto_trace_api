<h1>{{ algorithm_title }}</h1>
<p class="lead">{{ algorithm_desc }}</p>
<div class="grid-cards">
  <article class="card"><h3>输入区</h3><p>预留输入明文/密文或消息文本。</p></article>
  <article class="card"><h3>参数区</h3><p>预留 key、iv、mode、迭代次数等参数。</p></article>
  <article class="card"><h3>输出区</h3><p>预留结果展示（hex/base64/text）。</p></article>
  <article class="card"><h3>Trace 区</h3><p>预留执行过程轨迹展示。</p></article>
</div>
